<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Lawyer Profile | NyayaSetu</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f0c1a 0%, #1a1a2e 40%, #16213e 100%);
      color: #f0f0f0;
      min-height: 100vh;
    }
    .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
    .glass-card {
      background: rgba(25, 25, 40, 0.8);
      backdrop-filter: blur(16px);
      border-radius: 36px;
      padding: 40px;
      border: 1px solid rgba(255,140,66,0.4);
    }
    .logo { text-align: center; font-size: 2rem; font-weight: 800; background: linear-gradient(135deg,#fff,#ff8c42); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 20px; }
    h2 { color: #ff8c42; text-align: center; margin-bottom: 10px; }
    .subtitle { text-align: center; color: #aaa; margin-bottom: 30px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; color: #ffaa66; font-weight: 500; }
    input, select, textarea {
      width: 100%;
      padding: 14px;
      background: rgba(45,45,60,0.8);
      border: 1px solid rgba(255,140,66,0.3);
      border-radius: 20px;
      color: white;
      font-size: 1rem;
    }
    input[type="file"] { padding: 10px; }
    .row { display: flex; gap: 20px; }
    .row .form-group { flex: 1; }
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(95deg, #ff8c42, #f57c00);
      border: none;
      border-radius: 40px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 20px;
    }
    .messages { margin-bottom: 20px; }
    .message { padding: 12px; border-radius: 12px; margin-bottom: 10px; }
    .message.success { background: rgba(40,167,69,0.2); border: 1px solid #28a745; color: #28a745; }
    .message.error { background: rgba(220,53,69,0.2); border: 1px solid #dc3545; color: #dc3545; }
    @media (max-width: 768px) { .row { flex-direction: column; gap: 0; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="glass-card">
      <div class="logo">Nyaya<span style="color:#ff8c42;">Setu</span></div>
      <h2><i class="fas fa-gavel"></i> Create Lawyer Profile</h2>
      <p class="subtitle">Join as a legal professional and help citizens with their cases</p>
      
      {% if messages %}
        <div class="messages">
          {% for message in messages %}
            <div class="message {{ message.tags }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
      
      <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div class="row">
          <div class="form-group"><label><i class="fas fa-user"></i> Full Name *</label><input type="text" name="name" required></div>
          <div class="form-group"><label><i class="fas fa-envelope"></i> Email *</label><input type="email" name="email" required></div>
        </div>
        
        <div class="row">
          <div class="form-group"><label><i class="fas fa-phone"></i> Phone *</label><input type="tel" name="phone" required></div>
          <div class="form-group"><label><i class="fas fa-graduation-cap"></i> Degree *</label><input type="text" name="degree" placeholder="LLB, LLM, etc." required></div>
        </div>
        
        <div class="row">
          <div class="form-group"><label><i class="fas fa-briefcase"></i> Specialization *</label>
            <select name="specialization" required>
              <option value="">Select Specialization</option>
              <option value="Criminal">Criminal Law</option><option value="Civil">Civil Law</option>
              <option value="Cyber">Cyber Law</option><option value="Corporate">Corporate Law</option>
              <option value="Family">Family Law</option><option value="Property">Property Law</option>
              <option value="Consumer">Consumer Law</option><option value="Labor">Labor Law</option>
              <option value="Tax">Tax Law</option>
            </select>
          </div>
          <div class="form-group"><label><i class="fas fa-calendar"></i> Experience (years) *</label><input type="number" name="experience" min="0" required></div>
        </div>
        
        <div class="row">
          <div class="form-group"><label><i class="fas fa-taka-sign"></i> Consultation Fee (৳)</label><input type="number" name="consultation_fee" value="500" step="100"></div>
          <div class="form-group"><label><i class="fas fa-id-card"></i> Bar Council ID *</label><input type="text" name="bar_council_id" required></div>
        </div>
        
        <div class="form-group"><label><i class="fas fa-file-alt"></i> Cases Handled</label><textarea name="cases_handled" rows="3" placeholder="e.g., Criminal defense, Corporate disputes, Family matters..."></textarea></div>
        
        <div class="form-group"><label><i class="fas fa-user-edit"></i> Professional Bio</label><textarea name="bio" rows="4" placeholder="Tell about your experience and expertise..."></textarea></div>
        
        <div class="form-group"><label><i class="fas fa-certificate"></i> Bar Council Certificate (PDF/Image)</label><input type="file" name="certificate" accept=".pdf,.jpg,.png"></div>
        
        <button type="submit" class="btn"><i class="fas fa-save"></i> Create Lawyer Profile</button>
      </form>
      
      <div style="text-align: center; margin-top: 20px;">
        <a href="{% url 'lawyer_portal' %}" style="color: #ff8c42;">← Back to Lawyer Portal</a>
      </div>
    </div>
  </div>
</body>
</html>
