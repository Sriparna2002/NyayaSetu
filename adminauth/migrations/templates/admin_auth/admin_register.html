<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Register | NyayaSetu</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f0c1a 0%, #1a1a2e 40%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .glass-card {
      background: rgba(25, 25, 40, 0.8);
      backdrop-filter: blur(16px);
      border-radius: 36px;
      padding: 40px;
      width: 100%;
      max-width: 450px;
      border: 1px solid rgba(255,140,66,0.4);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    .logo {
      text-align: center;
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ffffff, #ff8c42);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 10px;
    }
    .admin-badge {
      text-align: center;
      background: rgba(255,140,66,0.2);
      display: inline-block;
      width: 100%;
      padding: 5px;
      border-radius: 20px;
      font-size: 0.8rem;
      color: #ff8c42;
      margin-bottom: 30px;
    }
    h2 {
      color: #ff8c42;
      text-align: center;
      margin-bottom: 30px;
      font-size: 1.8rem;
    }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; color: #ffaa66; font-weight: 500; }
    input {
      width: 100%;
      padding: 14px;
      background: rgba(45,45,60,0.8);
      border: 1px solid rgba(255,140,66,0.3);
      border-radius: 20px;
      color: white;
      font-size: 1rem;
      transition: 0.2s;
    }
    input:focus { outline: none; border-color: #ff8c42; }
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(95deg, #ff8c42, #f57c00);
      border: none;
      border-radius: 40px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 10px;
      color: #0a0a0a;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255,140,66,0.4); }
    .link { text-align: center; margin-top: 20px; color: #b0b5c4; }
    .link a { color: #ff8c42; text-decoration: none; }
    .link a:hover { text-decoration: underline; }
    .messages { margin-bottom: 20px; }
    .message {
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 10px;
      font-size: 0.9rem;
    }
    .message.success { background: rgba(40,167,69,0.2); border: 1px solid #28a745; color: #28a745; }
    .message.error { background: rgba(220,53,69,0.2); border: 1px solid #dc3545; color: #dc3545; }
    .message.info { background: rgba(23,162,184,0.2); border: 1px solid #17a2b8; color: #17a2b8; }
    .key-hint {
      background: rgba(255,140,66,0.1);
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 20px;
      font-size: 0.8rem;
      text-align: center;
      color: #ffaa66;
    }
  </style>
</head>
<body>
  <div class="glass-card">
    <div class="logo">Nyaya<span style="color:#ff8c42;">Setu</span></div>
    <div class="admin-badge"><i class="fas fa-user-shield"></i> Admin Registration</div>
    <h2><i class="fas fa-user-plus"></i> Register Admin</h2>
    
    {% if messages %}
      <div class="messages">
        {% for message in messages %}
          <div class="message {{ message.tags }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
    
    <div class="key-hint">
      <i class="fas fa-key"></i> Admin Registration Key: <strong>NyayaSetu@2026</strong>
    </div>
    
    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label><i class="fas fa-user"></i> Username</label>
        <input type="text" name="username" placeholder="Choose a username" required>
      </div>
      <div class="form-group">
        <label><i class="fas fa-envelope"></i> Email</label>
        <input type="email" name="email" placeholder="Enter your email" required>
      </div>
      <div class="form-group">
        <label><i class="fas fa-key"></i> Admin Registration Key</label>
        <input type="password" name="admin_key" placeholder="Enter admin registration key" required>
      </div>
      <div class="form-group">
        <label><i class="fas fa-lock"></i> Password</label>
        <input type="password" name="password" placeholder="Create a password" required>
      </div>
      <div class="form-group">
        <label><i class="fas fa-check-circle"></i> Confirm Password</label>
        <input type="password" name="confirm_password" placeholder="Confirm your password" required>
      </div>
      <button type="submit" class="btn"><i class="fas fa-user-shield"></i> Register as Admin</button>
    </form>
    <div class="link">
      Already have an admin account? <a href="{% url 'admin_login' %}">Login here</a>
    </div>
    <div class="link">
      <a href="/">← Back to Home</a>
    </div>
  </div>
</body>
</html>
